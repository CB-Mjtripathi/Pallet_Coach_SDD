name: Quality Gates

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Run backend unit tests
        env:
          PYTHONPATH: scripts
        run: |
          python -m pytest scripts/tests -q

      - name: Run evaluation harness with sample parity
        env:
          PYTHONPATH: scripts
        run: |
          python eval/run_eval.py --include-sample-parity
